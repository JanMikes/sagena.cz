name: Frontend

permissions:
    contents: read
    deployments: write
    packages: write

on:
    push:
        branches:
            - 'main'
        paths:
            - 'frontend/**'
            - '.github/workflows/frontend.yml'

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    docker-image:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Docker meta
                id: meta
                uses: docker/metadata-action@v5
                with:
                    images: |
                        ghcr.io/janmikes/sagena.cz
                    tags: |
                        type=ref,event=branch
                        type=ref,event=pr

            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v3

            -   name: Login to GHCR
                if: github.event_name != 'pull_request'
                uses: docker/login-action@v3
                with:
                    registry: ghcr.io
                    username: ${{ github.repository_owner }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Build and push Frontend
                uses: docker/build-push-action@v5
                with:
                    context: ./frontend
                    push: ${{ github.event_name != 'pull_request' }}
                    tags: ${{ steps.meta.outputs.tags }}
                    labels: ${{ steps.meta.outputs.labels }}
                    provenance: false
                    sbom: false
                    cache-from: type=registry,ref=ghcr.io/janmikes/sagena.cz:cache
                    cache-to: type=registry,ref=ghcr.io/janmikes/sagena.cz:cache,mode=max,oci-mediatypes=true,compression=zstd,force-compression=true,ignore-error=true
                    build-args: |
                        APP_VERSION=${{ github.sha }}

    deploy:
        runs-on: ubuntu-latest
        needs:
            - docker-image
        steps:
            - name: executing remote ssh commands using ssh key
              uses: appleboy/ssh-action@master
              with:
                host: sagena.thedevs.cz
                username: ${{ secrets.DEPLOY_USERNAME }}
                key: ${{ secrets.DEPLOY_PRIVATE_KEY }}
                script: cd /deployment/sagena && ./deploy-frontend.sh
